# =============================================================================
# Supply-chain security (pnpm 10.x+).
#
# Workspace-of-one. `packages: ['.']` is required (not optional) under
# pnpm 10.20+: `verifyDepsBeforeRun: error` validates against
# `node_modules/.pnpm-workspace-state.json`, which pnpm only writes when a
# workspace is declared. Without the key the state file is never created
# and every `pnpm run`/`pnpm exec` fails ERR_PNPM_VERIFY_DEPS_BEFORE_RUN —
# unconditionally, not just after a Speakeasy regen. All other settings
# below are still read from this file regardless.
#
# See: https://pnpm.io/supply-chain-security and https://pnpm.io/settings
packages:
  - .
# =============================================================================

# Refuse to install any package version younger than 7 days.
# 10080 minutes = 7 * 24 * 60.
minimumReleaseAge: 10080
minimumReleaseAgeExclude: []

# Transitive deps must resolve from a real registry — no git URLs or tarballs
# from indirect dependencies.
blockExoticSubdeps: true

# Refuse install if trust signals (maintainer set, provenance, publisher
# signatures) have regressed compared to earlier releases.
trustPolicy: no-downgrade
trustPolicyExclude: []

# Fail install if any dep has an unreviewed lifecycle script. Each allowed
# package is a deliberate decision, logged in the PR that adds it.
strictDepBuilds: true
onlyBuiltDependencies:
  - esbuild # platform binary download (via vitest → vite → esbuild)

# Acknowledged but NOT built — their lifecycle scripts are deliberately not
# run (keeps the build surface minimal; clears ERR_PNPM_IGNORED_BUILDS
# without granting them script execution). Both arrive via wrangler (Workers
# smoke). workerd ships its runtime binary via per-platform
# optionalDependencies (@cloudflare/workerd-*), so its install.js postinstall
# is not required; sharp's native image build is never exercised by the
# import/construct smoke. If a clean-CI run shows workerd cannot resolve its
# binary without the postinstall, promote `workerd` to onlyBuiltDependencies.
ignoredBuiltDependencies:
  - workerd
  - sharp

# Peer dep mismatches are real bugs.
autoInstallPeers: false
strictPeerDependencies: true

# Every `pnpm <script>` verifies node_modules matches the lockfile first.
verifyDepsBeforeRun: error

# Include full tarball URLs in the lockfile for artifact provenance.
lockfileIncludeTarballUrl: true

# NOTE: transitive security `overrides` live in package.json `pnpm.overrides`
# (managed via .speakeasy/gen.yaml `additionalPackageJSON` so they survive
# regen), NOT here. `overrides` in pnpm-workspace.yaml + `verifyDepsBeforeRun:
# error` is an overeager-validation combination under pnpm 10.20 (pnpm#9777):
# every `pnpm run`/`exec` fails "Setting overrides of lockfile is outdated"
# even immediately after a clean install. package.json `pnpm.overrides` is
# the long-stable canonical location the verify routine handles correctly.
