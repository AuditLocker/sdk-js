# Supply-chain hardened pnpm config (pnpm 11).
# Under pnpm 11 `.npmrc` is auth/registry only — every pnpm setting lives here.
# See: https://pnpm.io/supply-chain-security and https://pnpm.io/settings

# Workspace-of-one. Required, not optional: verifyDepsBeforeRun validates
# against pnpm's workspace-state file, which is only written for a declared
# workspace. Omit it and every `pnpm run`/`exec` fails.
packages:
  - .

# engine-strict / update-notifier moved here from .npmrc (pnpm 11 ignores them
# there). enablePrePostScripts is pinned because pnpm 11 flipped its default
# to true; `prepublishOnly` is the only hook (publish uses `npm publish`).
engineStrict: true
updateNotifier: false
enablePrePostScripts: true

# Refuse any package version younger than 7 days (10080 = 7*24*60 min).
minimumReleaseAge: 10080
minimumReleaseAgeExclude: []

# Transitive deps must resolve from a real registry — no git URLs or tarballs.
blockExoticSubdeps: true

# Refuse install if trust signals (maintainers, provenance, signatures)
# regress versus earlier releases.
trustPolicy: no-downgrade
trustPolicyExclude:
  # chokidar 4.x ships without npm provenance; 3.x had it. A long-standing
  # maintainer publishing habit (paulmillr), not a compromise signal.
  # minimumReleaseAge still applies. Transitive (wrangler → … → chokidar).
  - chokidar

# Fail install on any unreviewed lifecycle script. pnpm 11 replaced
# onlyBuiltDependencies/ignoredBuiltDependencies with one allowBuilds map:
# `true` runs the script, `false` acknowledges it without running it.
strictDepBuilds: true
allowBuilds:
  esbuild: true # native binary download (vitest → vite → esbuild)
  # workerd/sharp arrive via wrangler (Workers smoke); scripts skipped — workerd
  # ships its binary via @cloudflare/workerd-* optionalDeps, sharp's native
  # build is never exercised. Flip workerd to true if its binary won't resolve.
  workerd: false
  sharp: false

# Peer dep mismatches are real bugs.
autoInstallPeers: false
strictPeerDependencies: true

# Verify node_modules matches the lockfile before every script.
verifyDepsBeforeRun: error

# Full tarball URLs in the lockfile for artifact provenance.
lockfileIncludeTarballUrl: true

# Transitive-security overrides. pnpm 11 stopped reading the package.json
# `pnpm` field, so these live here (the old pnpm#9777 interaction with
# verifyDepsBeforeRun is fixed in pnpm 11). Not Speakeasy-managed — survives
# regen because Speakeasy never rewrites this file. The SDK never runs a Vite
# dev server; we patch rather than allowlist the advisories.
overrides:
  postcss: '>=8.5.10'
  vite: ^8
