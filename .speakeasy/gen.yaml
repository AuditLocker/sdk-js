configVersion: 2.0.0
generation:
  devContainers:
    # Disabled: the generated .devcontainer is Speakeasy's consumer "SDK
    # Sandbox" (Codespaces try-it). Its base image is pinned to an EOL Node
    # and its setup.sh uses `npm install --ignore-scripts`, both hardcoded in
    # the Speakeasy template (devContainers exposes only enabled/schemaPath —
    # no image/Node/pm knob). That contradicts this repo's Node >=22 floor
    # and pnpm supply-chain lockdown and cannot be fixed in place, so the
    # sandbox is dropped rather than carried as a misleading surface.
    enabled: false
  sdkClassName: AuditLocker
  maintainOpenAPIOrder: true
  usageSnippets:
    optionalPropertyRendering: withExample
    sdkInitStyle: constructor
  useClassNamesForArrayFields: true
  fixes:
    nameResolutionDec2023: true
    nameResolutionFeb2025: true
    parameterOrderingFeb2024: true
    requestResponseComponentNamesFeb2024: true
    securityFeb2025: true
    sharedErrorComponentsApr2025: true
    sharedNestedComponentsJan2026: true
    nameOverrideFeb2026: true
  auth:
    oAuth2ClientCredentialsEnabled: false
    oAuth2PasswordEnabled: false
    hoistGlobalSecurity: true
  inferSSEOverload: true
  sdkHooksConfigAccess: true
  schemas:
    allOfMergeStrategy: shallowMerge
  requestBodyFieldName: body
  versioningStrategy: automatic
  persistentEdits: {}
  tests:
    generateTests: false
    generateNewTests: true
    skipResponseBodyAssertions: false
typescript:
  version: 0.0.0
  acceptHeaderEnum: false
  additionalDependencies:
    dependencies: {}
    devDependencies:
      '@arethetypeswrong/cli': ^0.18
      oxfmt: ^0.48.0
      publint: ^0.3
      rolldown: 1.0.0-rc.18
      vitest: ^4.1.5
      wrangler: ^4.90.0
    peerDependencies: {}
  additionalPackageJSON:
    bugs:
      url: https://github.com/auditlocker/sdk-js/issues
    description: Official JavaScript / TypeScript client for the AuditLocker managed audit-logging service
    engines:
      node: '>=22'
      pnpm: '>=11'
    files:
      - dist
    packageManager: pnpm@11.1.3
    homepage: https://auditlocker.co
    keywords:
      - audit
      - logging
      - compliance
      - soc2
      - sdk
      - auditlocker
    license: Apache-2.0
    publishConfig:
      access: public
      provenance: true
    repository:
      type: git
      url: git+https://github.com/auditlocker/sdk-js.git
  additionalScripts:
    attw: attw --pack . --profile node16
    audit:ci: pnpm dlx audit-ci@7.1.0 --config ./audit-ci.jsonc
    format: oxfmt --check
    format:fix: oxfmt
    publint: publint
    regen: speakeasy run --skip-versioning && node scripts/repoint-entry.mjs && pnpm install && pnpm build
    test: vitest run
    typecheck: tsgo --noEmit
  alwaysIncludeInboundAndOutbound: false
  author: AuditLocker <support@auditlocker.co>
  baseErrorName: AuditLockerError
  clientServerStatusCodesAsErrors: true
  compileCommand:
    - pnpm
    - run
    - build
  constFieldsAlwaysOptional: false
  defaultErrorName: AuditLockerDefaultError
  enableCustomCodeRegions: false
  enableMCPServer: false
  enableReactQuery: false
  enumFormat: union
  envVarPrefix: AUDITLOCKER
  exportZodModelNamespace: false
  fixEnumNameSanitization: false
  flatAdditionalProperties: true
  flattenGlobalSecurity: true
  flatteningOrder: parameters-first
  formStringArrayEncodeMode: array
  forwardCompatibleEnumsByDefault: true
  forwardCompatibleUnionsByDefault: tagged-only
  generateExamples: true
  imports:
    option: openapi
    paths:
      callbacks: models/callbacks
      errors: models/errors
      operations: models/operations
      shared: models
      webhooks: models/webhooks
  inferUnionDiscriminators: true
  inputModelSuffix: input
  jsonpath: rfc9535
  laxMode: lax
  legacyFileNaming: false
  maxMethodParams: 0
  methodArguments: infer-optional-args
  modelPropertyCasing: camel
  moduleFormat: dual
  multipartArrayFormat: standard
  outputModelSuffix: output
  packageName: '@auditlocker/sdk'
  preApplyUnionDiscriminators: true
  preserveModelFieldNames: false
  responseFormat: flat
  sseFlatResponse: false
  templateVersion: v2
  unionStrategy: populated-fields
  usageSDKInitImports: []
  useIndexModules: true
  useOxlint: true
  useTsgo: true
  zodVersion: v4-mini
