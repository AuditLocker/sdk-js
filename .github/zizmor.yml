# zizmor config — https://docs.zizmor.sh/configuration/
# CI runs `zizmor --persona=auditor --offline` (auto-discovers this file).
#
# No config-file ignores. Suppress findings inline at the callsite with
# `# zizmor: ignore[rule]` so the scope is the single step and a human
# re-reviews if it moves. Never disable a rule globally here.
rules: {}
