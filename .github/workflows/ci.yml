# =============================================================================
# CI pipeline for @auditlocker/sdk
#
# Gates:
#   1. audit     — audit-ci at moderate+ (runs BEFORE pnpm install)
#   2. lint      — oxlint
#   3. format    — oxfmt --check
#   4. typecheck — tsgo --noEmit
#   5. build     — tshy (dual CJS+ESM; required before test — CJS smoke needs dist/)
#   6. test      — vitest
#   7. publish   — publint + attw (package.json + type export correctness)
#   8. bundle    — rolldown combined (SDK + Zod) minified-ESM size budget
#
# Node matrix: 22, 24 (SDK supports >=22; Node 20 EOL'd 2026-04-30). We
# develop on 24 (.nvmrc); 22 is the published floor (engines.node).
# =============================================================================

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 1. Audit ────────────────────────────────────────────────────────────────
  # Runs BEFORE any pnpm install so a compromised postinstall cannot execute
  # ahead of the audit. Uses pnpm dlx (not a devDependency).
  audit:
    name: audit-ci
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Check for lockfile
        id: lockfile
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No lockfile yet — audit-ci will activate when real deps land."
          fi

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        if: steps.lockfile.outputs.present == 'true'
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        if: steps.lockfile.outputs.present == 'true'
        with:
          node-version: 24

      - name: Run audit-ci
        if: steps.lockfile.outputs.present == 'true'
        run: pnpm dlx audit-ci@7.1.0 --config ./audit-ci.jsonc

  # ── 2–6. Quality gates ─────────────────────────────────────────────────────
  check:
    name: check (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format

      - name: Typecheck
        run: pnpm typecheck

      # Build before Test: test/cjs-require.test.ts resolves the package
      # through dist/commonjs to prove the dual-emit CJS entry (Phase
      # 3.1.1), so dist/ must exist before the test gate runs.
      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # SDK-specific publish-readiness gates. Only need to run on one Node
      # version — the output is identical.
      - name: publint
        if: matrix.node == 24
        run: pnpm publint

      - name: Are the types wrong?
        if: matrix.node == 24
        run: pnpm attw

  # ── 7. Multi-runtime import smoke ──────────────────────────────────────────
  # Node ESM + Node CJS are covered by the `check` matrix (CJS via
  # test/cjs-require.test.ts). This job adds the edge runtimes: Deno and Bun
  # each import the built ESM bundle and construct the client. No network —
  # a networked staging round-trip is out of scope here. Catches
  # node:-prefixed imports and WebCrypto gaps that the Node jobs can't.
  runtimes:
    name: runtime smoke (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        runtime: [deno, bun]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Setup Deno
        if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Deno import smoke
        if: matrix.runtime == 'deno'
        run: deno run --allow-read --allow-env test/runtime-smoke.mjs

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Bun import smoke
        if: matrix.runtime == 'bun'
        run: bun test/runtime-smoke.mjs

  # ── 8. Bundle size gate ────────────────────────────────────────────────────
  # Combined (SDK + Zod) minified-ESM size, measured with the pinned rolldown.
  # Combined is the failing gate; sdk-only is logged informational. Self-
  # contained (builds dist/ then measures) — see scripts/bundle-size.mjs.
  bundle-size:
    name: bundle size
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Bundle size (combined gate + sdk-only informational)
        run: node scripts/bundle-size.mjs
